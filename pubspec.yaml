name: ai_chat_app
description: A production-grade AI chat app with streaming responses, markdown rendering, voice input, conversation history, and prompt templates — powered by the Claude API.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management, DI, routing
  get: ^4.6.6
  get_storage: ^2.1.1

  # Secure API key storage
  flutter_secure_storage: ^9.2.2

  # Networking + streaming
  dio: ^5.7.0
  http: ^1.2.2

  # Markdown rendering
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2

  # Voice input
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # Local conversation history
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Firebase (auth + sync)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_crashlytics: ^4.1.3

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Share & copy
  share_plus: ^10.1.2

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.4.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  package_info_plus: ^8.1.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
